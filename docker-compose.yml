version: "3.8"

services:
  mysql:
    image: mysql:8.0
    container_name: station_mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: station_crm
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: station
      MYSQL_PASSWORD: station123
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password

volumes:
  mysql_data: